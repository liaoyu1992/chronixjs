name: Feature request
description: Propose a new feature or behavior change
labels: [enhancement]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@chronixjs/gantt'
        - '@chronixjs/table'
        - '@chronixjs/input'
        - new package
        - tooling
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
