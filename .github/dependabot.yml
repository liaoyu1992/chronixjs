version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - eslint
          - eslint-*
          - '@eslint/*'
          - '@typescript-eslint/*'
          - 'typescript-eslint'
      stylelint:
        patterns:
          - stylelint*
      typescript:
        patterns:
          - typescript
          - '@types/*'
      vitest:
        patterns:
          - vitest
          - '@vitest/*'
      build-tools:
        patterns:
          - tsup
          - turbo
          - rimraf
      changesets:
        patterns:
          - '@changesets/*'
    ignore:
      # TypeScript 6 needs typescript-eslint 9 + tsup TS6-aware release.
      # Re-evaluate once both ship; remove this ignore then.
      - dependency-name: 'typescript'
        versions: ['>=6']
      # Vitest 4 is now supported. Vite 8 for Vue3/React, Vite 7 for Vue2.
      # - dependency-name: 'vitest'
      #   versions: ['>=5']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
