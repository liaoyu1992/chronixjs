version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - eslint
          - eslint-*
          - '@eslint/*'
          - '@typescript-eslint/*'
          - 'typescript-eslint'
      stylelint:
        patterns:
          - stylelint*
      typescript:
        patterns:
          - typescript
          - '@types/*'
      vitest:
        patterns:
          - vitest
          - '@vitest/*'
      build-tools:
        patterns:
          - tsup
          - turbo
          - rimraf
      changesets:
        patterns:
          - '@changesets/*'
    ignore:
      # Vue 2.7 is final Vue 2 release; Vue 3.x requires full migration.
      # Only allow minor/patch updates within 2.7.x.
      - dependency-name: 'vue'
        versions: ['>=3']
      - dependency-name: 'vue'
        update-types: ['version-update:semver-major']
      # TypeScript 6 needs typescript-eslint 9 + tsup TS6-aware release.
      # Re-evaluate once both ship; remove this ignore then.
      - dependency-name: 'typescript'
        versions: ['>=6']
      # Prettier formatting changes require reformatting entire codebase.
      # Handle as dedicated formatting PR, not via Dependabot.
      - dependency-name: 'prettier'
        versions: ['>=3.9']
      # Vitest 4 is now supported. Vite 8 for Vue3/React, Vite 7 for Vue2.
      # - dependency-name: 'vitest'
      #   versions: ['>=5']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
