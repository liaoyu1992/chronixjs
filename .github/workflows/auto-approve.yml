name: Auto-approve admin PRs

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Only run for repo owner
    if: contains(fromJSON('["liaoyu1992"]'), github.event.pull_request.user.login)
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.BOT_REVIEWER_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve \
            --body "🤖 Auto-approved by bot reviewer"
      - name: Enable auto-merge (squash) once required checks pass
        # Requires repo setting: Settings → General → Pull Requests → "Allow auto-merge"
        # Best-effort — the approval above is the critical step; a failure here
        # (e.g. draft PR, token lacking merge scope) must NOT block the merge.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.BOT_REVIEWER_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch \
            --auto
