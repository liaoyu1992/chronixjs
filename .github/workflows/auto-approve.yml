name: Auto-approve admin PRs

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Only run for repo admins/maintainers
    if: contains(fromJSON('["liaoyu1992"]'), github.event.pull_request.user.login)
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: "🤖 Auto-approved (repo admin PR)"
