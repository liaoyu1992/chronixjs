name: Auto-approve owner & dependabot PRs

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened, synchronize]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Run for the repo owner AND dependabot. Dependabot PRs only touch manifest /
    # lockfile deps, so auto-approving them is safe; the auto-merge step below is
    # still gated by required checks (`--auto`), so a bump that breaks CI will not
    # merge. Add other trusted bots/apps here.
    if: contains(fromJSON('["liaoyu1992", "dependabot[bot]"]'), github.event.pull_request.user.login)
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.BOT_REVIEWER_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve \
            --body "🤖 Auto-approved by bot reviewer"
      - name: Enable auto-merge (squash) once required checks pass
        # Requires repo setting: Settings → General → Pull Requests → "Allow auto-merge"
        # Best-effort — the approval above is the critical step; a failure here
        # (e.g. draft PR, token lacking merge scope) must NOT block the merge.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.BOT_REVIEWER_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch \
            --auto
